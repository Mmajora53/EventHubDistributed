apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  namespace: eventhub
  name: eventhub-app-rolebinding
subjects:
- kind: ServiceAccount
  name: default          # le ServiceAccount par défaut utilisé par tes pods
  namespace: eventhub
roleRef:
  kind: Role
  name: eventhub-app-role
  apiGroup: rbac.authorization.k8s.io