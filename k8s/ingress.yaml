apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eventhub-ingress
  namespace: eventhub
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/events
        pathType: Prefix
        backend:
          service:
            name: event-service
            port:
              number: 8000